services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-16}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  deepwiki:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8001}:${PORT:-8001}"  # API port
      - "3000:3000"  # Next.js port
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8001}
      - NODE_ENV=production
      - SERVER_BASE_URL=http://localhost:${PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-api/logs/application.log}
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_EMBED_WORKERS=${OLLAMA_EMBED_WORKERS:-16}
      # vLLM settings (uncomment and configure for on-premise vLLM server)
      # - VLLM_BASE_URL=${VLLM_BASE_URL}
      # - VLLM_API_KEY=${VLLM_API_KEY:-no-key-required}
      # - VLLM_MODEL=${VLLM_MODEL}
      # - VLLM_EMBED_MODEL=${VLLM_EMBED_MODEL}
      # - DEEPWIKI_EMBEDDER_TYPE=vllm
      # Proxy settings (uncomment for on-premise environments)
      # - HTTP_PROXY=${HTTP_PROXY}
      # - HTTPS_PROXY=${HTTPS_PROXY}
      # - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,ollama}
    volumes:
      - ~/.adalflow:/root/.adalflow      # Persist repository and embedding data
      - ./api/logs:/app/api/logs          # Persist log files across container restarts
    depends_on:
      ollama:
        condition: service_healthy
    # Resource limits for docker-compose up (not Swarm mode)
    mem_limit: 6g
    mem_reservation: 2g
    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8001}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ollama_data:
